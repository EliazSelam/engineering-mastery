<svg width="512" height="512" viewBox="0 0 340 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5CE5"/>
      <stop offset="100%" stop-color="#3A8FD4"/>
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Black background (maskable needs full bleed) -->
  <rect width="340" height="340" fill="black"/>

  <!-- Outer circle - slightly smaller for maskable safe zone -->
  <circle cx="170" cy="170" r="130" stroke="url(#circleGrad)" stroke-width="3.5" fill="none"/>

  <!-- Left leaf with dark bolt -->
  <path d="M138 85 C130 75 119 70 113 81 C107 90 114 103 128 99 L132 90 L137 97 L141 85 Z" fill="url(#symbolGrad)" opacity="0.9"/>
  <path d="M128 99 L130 92 L125 94 L131 85" stroke="rgba(0,0,0,0.55)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Center leaf with dark bolt (tallest) -->
  <path d="M170 72 C163 59 155 53 150 64 C145 74 153 88 165 85 L167 76 L170 83 L173 76 L175 85 C187 88 195 74 190 64 C185 53 177 59 170 72 Z" fill="url(#symbolGrad)" opacity="0.95"/>
  <path d="M170 85 L168 74 L165 77 L169 68" stroke="rgba(0,0,0,0.55)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Right leaf with dark bolt -->
  <path d="M202 85 C210 75 221 70 227 81 C233 90 226 103 212 99 L208 90 L203 97 L199 85 Z" fill="url(#symbolGrad)" opacity="0.9"/>
  <path d="M212 99 L210 92 L215 94 L209 85" stroke="rgba(0,0,0,0.55)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Flowing connector stem -->
  <path d="M170 103 C168 110 162 118 158 127" stroke="url(#symbolGrad)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ES combined symbol -->
  <path d="M190 127 C210 122 218 137 205 149 C192 161 175 159 168 173 C162 186 170 203 188 206 C204 209 218 199 220 186"
        stroke="url(#symbolGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <line x1="148" y1="132" x2="148" y2="207" stroke="url(#symbolGrad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="148" y1="132" x2="192" y2="132" stroke="url(#symbolGrad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="148" y1="169" x2="182" y2="169" stroke="url(#symbolGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="148" y1="207" x2="190" y2="207" stroke="url(#symbolGrad)" stroke-width="12" stroke-linecap="round"/>
</svg>
