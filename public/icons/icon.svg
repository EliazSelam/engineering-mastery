<svg width="512" height="512" viewBox="0 0 340 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5CE5"/>
      <stop offset="100%" stop-color="#3A8FD4"/>
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Black background -->
  <rect width="340" height="340" fill="black"/>

  <!-- Outer circle -->
  <circle cx="170" cy="170" r="148" stroke="url(#circleGrad)" stroke-width="3.5" fill="none"/>

  <!-- Left leaf with dark bolt -->
  <path d="M138 72 C128 60 115 55 108 68 C102 78 110 92 125 88 L130 78 L135 85 L140 72 Z" fill="url(#symbolGrad)" opacity="0.9"/>
  <path d="M125 88 L127 80 L122 82 L128 72" stroke="rgba(0,0,0,0.55)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Center leaf with dark bolt (tallest) -->
  <path d="M170 58 C163 44 153 38 148 50 C143 61 152 76 165 73 L167 63 L170 70 L173 63 L175 73 C188 76 197 61 192 50 C187 38 177 44 170 58 Z" fill="url(#symbolGrad)" opacity="0.95"/>
  <path d="M170 73 L168 62 L165 65 L169 55" stroke="rgba(0,0,0,0.55)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Right leaf with dark bolt -->
  <path d="M202 72 C212 60 225 55 232 68 C238 78 230 92 215 88 L210 78 L205 85 L200 72 Z" fill="url(#symbolGrad)" opacity="0.9"/>
  <path d="M215 88 L213 80 L218 82 L212 72" stroke="rgba(0,0,0,0.55)" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Flowing connector stem from leaves to ES -->
  <path d="M170 90 C168 98 162 106 158 115" stroke="url(#symbolGrad)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- ES combined symbol -->
  <!-- S curve body -->
  <path d="M190 115 C210 110 218 125 205 138 C192 150 175 148 168 162 C162 175 170 192 188 195 C204 198 218 188 220 175"
        stroke="url(#symbolGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- E vertical bar -->
  <line x1="148" y1="120" x2="148" y2="196" stroke="url(#symbolGrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- E horizontal bars -->
  <line x1="148" y1="120" x2="192" y2="120" stroke="url(#symbolGrad)" stroke-width="12" stroke-linecap="round"/>
  <line x1="148" y1="158" x2="182" y2="158" stroke="url(#symbolGrad)" stroke-width="10" stroke-linecap="round"/>
  <line x1="148" y1="196" x2="190" y2="196" stroke="url(#symbolGrad)" stroke-width="12" stroke-linecap="round"/>
</svg>
